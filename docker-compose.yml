services:
  hyeameha-backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: hyeameha-backend
    restart: always
    ports:
      - '${HYEAMEHA_BACKEND_PORT:-3300}:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DATABASE_HOST: hyeameha-db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      REDIS_HOST: hyeameha-redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      THROTTLE_AUTH_TTL: ${THROTTLE_AUTH_TTL:-60}
      THROTTLE_AUTH_LIMIT: ${THROTTLE_AUTH_LIMIT:-5}
      THROTTLE_DEFAULT_TTL: ${THROTTLE_DEFAULT_TTL:-60}
      THROTTLE_DEFAULT_LIMIT: ${THROTTLE_DEFAULT_LIMIT:-100}
    depends_on:
      hyeameha-db:
        condition: service_healthy
      hyeameha-redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q -O - http://localhost:3000/health >/dev/null 2>&1 || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  hyeameha-db:
    image: postgres:15.17-trixie
    container_name: hyeameha-db
    restart: always
    # Host ports (defaults avoid common clashes; override with HYEAMEHA_DB_PORT)
    ports:
      - '${HYEAMEHA_DB_PORT:-56433}:5432'
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  hyeameha-redis:
    image: redis:trixie
    container_name: hyeameha-redis
    restart: always
    # Host ports (defaults avoid common clashes; override with HYEAMEHA_REDIS_PORT)
    ports:
      - '${HYEAMEHA_REDIS_PORT:-56480}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
